# sage — code reviewer agent, hosted in-process by cortex.
#
# Shape: in-process agent (sage#40). Cortex's `ReviewConsumer` owns the
# NATS subscribe loop, queue-group, ack/nak, redelivery, signature
# verification (D1), and lifecycle envelope emission. Cortex invokes
# sage's review pipeline as an injected `pipelineRunner` — entry point is
# `reviewPr` in `src/lenses/workflow.ts`.
#
# Pre-sage#40 this manifest also declared a `darwin-launchd` target with a
# plist + start/stop scripts. The launchd daemon was retired because
# cortex's review-consumer (cortex#237 PR-6) already does everything the
# daemon did — subscribe, ack, lifecycle envelopes, verdict emission,
# signature verification — except invoke pi-dev, and the substrate slot
# is pluggable via `ccSessionFactory` injection.

schema: arc/v1
name: sage
version: 0.2.2
type: agent
targets: [cortex]
description: >-
  Code review agent on pi.dev, Claude Code, or Codex CLI. Hosted
  in-process by cortex: cortex's ReviewConsumer dispatches code-review
  tasks pulled off the Myelin bus into sage's review pipeline, sage
  returns a verdict, cortex emits the verdict envelope.
license: MIT
tier: official
author:
  name: Jens-Christian Fischer
  github: jcfischer

runtime:
  # arc/v1 exposes a scalar substrate field; substrate selection at the
  # pipeline layer additionally honors `--substrate` / SAGE_SUBSTRATE /
  # config (see src/substrate/select.ts).
  substrate: pi-dev
  # sage#40 — sage no longer runs as its own process. Cortex hosts the
  # review-consumer subscription and invokes sage's pipelineRunner.
  mode: in-process
  # Per-flavor capability shape (sage#40) aligned with pilot's
  # KNOWN_SPECIALIZATIONS so `tasks.code-review.<flavor>` envelopes route
  # to the right `provided_by` agent in the capability catalog. Bare
  # `code-review` (pre-#40) was ambiguous against the multi-agent
  # catalog where fern, sage, and future reviewers each cover a subset.
  capabilities:
    - code-review.typescript
    - code-review.python
    - code-review.rust
    - code-review.go
    - code-review.sql
    - code-review.docs
    - code-review.security
    - code-review.generic

identity:
  id: sage
  did: did:mf:sage
  displayName: Sage
  roles: [agent-restricted]
  trust: [luna, holly, ivy, pilot, fern]

# No presence block — Sage has no chat surface in v0.1. Verdicts surface
# via the bus → cortex dashboard render path.

depends_on:
  tools:
    - name: bun
      version: ">=1.1.0"
    - name: gh
      version: ">=2.0.0"
  # arc/v1 cannot express one-of tool dependencies. The lifecycle preinstall
  # script enforces that at least one supported LLM substrate is installed:
  # pi, claude, or codex.

provides:
  # Cortex host (arc 0.26.0 CortexHostAdapter):
  #   - sage.md → ~/.config/cortex/agents.d/sage.md
  # sage#40: the darwin-launchd plist provisioning retired with the
  # standalone daemon; cortex now hosts sage's pipeline in-process.
  #
  # The `binary` entry is RETAINED post-sage#40 as a thin operator-facing
  # CLI shim (review / dispatch / init only — no `serve` daemon loop).
  # `arc install` symlinks ~/bin/sage to this script so the operator
  # still has a runnable `sage review <pr>` for offline one-off review
  # work. (cycle-1 finding #2: removing the binary made the documented
  # `sage review` / `sage dispatch` commands unreachable.)
  files:
    - source: sage.md
      target: ~/.config/cortex/agents.d/sage.md
  binary: bin/sage

scripts:
  postinstall: bun install                       # pull deps into the install copy

lifecycle:
  preinstall:
    - scripts/check-cortex-version.sh    # cortex CLI on PATH (arc CortexHostAdapter.detect parity)
    - scripts/check-substrate-installed.sh # one supported LLM substrate on PATH
  postinstall:
    - scripts/signal-cortex-reload.sh    # cortex daemon registers sage from agents.d/ AND wires the in-process review-consumer
    - scripts/issue-nats-creds.sh        # cortex creds issue sage (scoped to declared capabilities)
  preuninstall:
    # Ordering rationale (cycle-3 finding #2):
    #   The drain step must run LAST. If `drain-tasks.sh` runs while
    #   cortex's in-process sage consumer is still subscribed, the queue
    #   keeps refilling with newly-claimed tasks and the bounded wait
    #   either takes forever or times out before the actual in-flight
    #   work completes. Tear down the consumer FIRST (via the
    #   cortex-reload signal), THEN drain.
    #
    # cycle-1 finding #1 — on upgrade from the pre-sage#40 standalone
    # shape, ~/Library/LaunchAgents/ai.meta-factory.sage.plist is still
    # loaded and the legacy daemon (which predates cortex's D1 signature
    # verifier wiring) would race the new in-process consumer for the
    # same broadcast pull. Run cleanup FIRST so the legacy daemon stops
    # claiming work before anything else. Idempotent — no-op on fresh
    # installs.
    - scripts/cleanup-legacy-daemon.sh   # FIRST — retire legacy plist + detach loaded job (idempotent)
    - scripts/signal-cortex-reload.sh    # THEN — cortex drops sage from registry, tears down the in-process consumer so no new tasks are claimed; creds revoked in removeArtifact per D7
    - scripts/drain-tasks.sh             # LAST — bounded wait on in-flight dispatch.task.completed; queue isn't refilling because the consumer is gone

capabilities:
  filesystem:
    read:
      - ~/.config/cortex/
      - ~/.config/nats/
      - ~/work/
    write:
      - ~/.config/cortex/logs/      # sage's verdicts surface through cortex's log stream now (sage#40)
      # cycle-1 finding #3 — `persistVerdict` (src/util/persistence.ts)
      # writes verdict artifacts to ~/.config/sage/reviews/<owner>-<repo>-<n>.{json,md}
      # so a `gh pr review` post-failure (sage#16) is recoverable manually.
      # Capability declaration must match the runtime write site.
      - ~/.config/sage/reviews/
      # cycle-4 finding — `scripts/cleanup-legacy-daemon.sh` does
      # `rm -f ~/Library/LaunchAgents/ai.meta-factory.sage.plist` during
      # preuninstall to retire the pre-#40 standalone-daemon plist on
      # upgrade. Same scope-narrowing as the `launchctl` restricted_to
      # entry in `bash` below: cleanup-only, retire this entry once every
      # operator has rolled past sage#40.
      - ~/Library/LaunchAgents/    # cleanup-only — scripts/cleanup-legacy-daemon.sh
  network:
    - domain: localhost
      reason: NATS bus connection (nats://127.0.0.1:4222)
    - domain: api.github.com
      reason: gh CLI fetches PR diff and posts review (auth piggybacks on user's gh login)
    - domain: api.openrouter.ai
      reason: substrate provider option (when configured)
    - domain: api.anthropic.com
      reason: substrate provider option
    - domain: api.openai.com
      reason: substrate provider option
  bash:
    allowed: true
    restricted_to:
      - pi              # LLM substrate subprocess
      - claude          # optional LLM substrate subprocess
      - codex           # optional LLM substrate subprocess
      - gh              # GitHub CLI
      - git             # repo introspection
      - bun             # runtime
      # cycle-2 finding #1 — launchctl is NOT used for sage's own lifecycle
      # anymore (the standalone daemon retired in sage#40). It is retained
      # in this allow-list solely so the `scripts/cleanup-legacy-daemon.sh`
      # preuninstall hook can bootout the pre-#40
      # ~/Library/LaunchAgents/ai.meta-factory.sage.plist on upgrade. Once
      # every operator has rolled past sage#40 this entry can retire too.
      - launchctl       # cleanup-only — scripts/cleanup-legacy-daemon.sh
  # All optional. Whichever provider key is set in cortex's env reaches
  # the active substrate subprocess via buildSubstrateEnv allow-list.
  secrets:
    - OPENROUTER_API_KEY
    - ANTHROPIC_API_KEY
    - OPENAI_API_KEY
